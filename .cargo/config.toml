# Cross-compilation support for Android.
#
# Prerequisites:
#   1. rustup target add aarch64-linux-android
#   2. Install Android NDK (r25+ recommended)
#   3. Add NDK toolchain to PATH:
#         $env:Path += ";$env:ANDROID_NDK_HOME\toolchains\llvm\prebuilt\windows-x86_64\bin"
#      or set CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER to the full clang path.
#
# Build:
#   cargo build --release --target aarch64-linux-android

[target.aarch64-linux-android]
linker = "aarch64-linux-android21-clang"
